name: Deploy API

on:
  push:
    branches:
      - master
    paths:
      - "shot-reminder-2.Api/**"
      - "shot-reminder-2.Application/**"
      - "shot-reminder-2.Domain/**"
      - "shot-reminder-2.Infrastructure/**"
      - "shot-reminder-2.Contracts/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ./shot-reminder-2.slnx

      - name: Publish API
        run: dotnet publish ./shot-reminder-2.Api/shot-reminder-2.Api.csproj -c Release -o ./publish/api

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish/api
